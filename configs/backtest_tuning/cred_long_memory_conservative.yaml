date_range:
  start: "2023-02-20"
  end: "2026-02-20"

engines:
  mas_quant_screener:
    enabled: true
    mode: "quant_only"
    top_n: 10
  koocore_d:
    enabled: true
    pit_mode: true
  gemini_stst:
    enabled: true
    skip_enrichment: true

synthesis:
  initial_weights:
    mas_quant_screener: 0.7
    koocore_d: 1.3
    gemini_stst: 1.2
  convergence_multipliers:
    2_engines: 1.3
    3_engines: 1.0
  rolling_credibility: true
  rolling_credibility_window: 60
  rolling_credibility_min_trades: 20
  rolling_credibility_weight_floor: 0.5
  rolling_credibility_weight_cap: 1.8
  top_n_per_day: 5
  min_confidence: 35.0
  diversity_enabled: true
  diversity_boost_multi_category: 1.10
  diversity_penalty_homogeneous_3plus: 0.85
  regime_convergence_overrides:
    bull:
      2_engines: 1.15
      3_engines: 0.85
    bear:
      2_engines: 0.95
      3_engines: 0.7
    choppy:
      2_engines: 1.0
      3_engines: 0.8

regime_gate_backtest:
  enabled: true
  strategy_weight_selection_mode: capped_best
  strategy_weight_uplift_cap: 1.10
  bear_penalty_multiplier: 0.65
  bear_blocked_strategies: "momentum"
  bear_penalized_strategies: "breakout,swing"
  weights:
    bull:
      breakout: 1.15
      momentum: 1.10
      swing: 1.05
      mean_reversion: 0.90
    bear:
      mean_reversion: 1.20
      defensive: 1.15
      breakout: 0.70
      momentum: 0.65
    choppy:
      mean_reversion: 1.08
      swing: 0.98
      momentum: 0.95
      breakout: 0.90

portfolio:
  capital: 100000
  max_positions: 10
  slippage_pct: 0.001
  commission_per_trade: 1.0
  holding_periods: [3, 5, 7]
  confidence_sizing: true

output_dir: "backtest_results/multi_engine"
tuning_meta:
  config_label: "cred_long_memory_conservative"
