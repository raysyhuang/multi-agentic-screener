date_range:
  start: "2023-02-01"
  end: "2026-02-17"

# Multi-horizon backtest (CLI-only):
#   python -m src.backtest.multi_engine.orchestrator --config ... --backtest-years 1,3,5
# When --backtest-years is passed, date_range.start is ignored and each horizon
# computes its own start from date_range.end.

engines:
  mas_quant_screener:
    enabled: true
    mode: "quant_only"
    top_n: 10
  koocore_d:
    enabled: true
    pit_mode: true
  gemini_stst:
    enabled: true
    skip_enrichment: true

synthesis:
  initial_weights:
    mas_quant_screener: 0.7
    koocore_d: 1.3
    gemini_stst: 1.2
  convergence_multipliers:
    2_engines: 1.3
    3_engines: 1.0
  rolling_credibility: true
  rolling_credibility_window: 40
  rolling_credibility_min_trades: 10
  rolling_credibility_weight_floor: 0.3
  rolling_credibility_weight_cap: 4.0
  top_n_per_day: 5
  min_confidence: 35.0
  diversity_enabled: true
  diversity_boost_multi_category: 1.15
  diversity_penalty_homogeneous_3plus: 0.70
  regime_convergence_overrides:
    bull:
      2_engines: 1.3
      3_engines: 0.85
    bear:
      2_engines: 1.0
      3_engines: 0.7
    choppy:
      2_engines: 1.1
      3_engines: 0.8

regime_gate_backtest:
  enabled: true
  strategy_weight_selection_mode: best
  strategy_weight_uplift_cap: 1.10
  bear_penalty_multiplier: 0.65
  bear_blocked_strategies: "momentum"
  bear_penalized_strategies: "breakout,swing"
  weights:
    bull:
      breakout: 1.20
      momentum: 1.15
      swing: 1.10
      mean_reversion: 0.85
    bear:
      mean_reversion: 1.25
      defensive: 1.20
      breakout: 0.65
      momentum: 0.60
    choppy:
      mean_reversion: 1.10
      swing: 0.95
      momentum: 0.90
      breakout: 0.85

portfolio:
  capital: 100000
  max_positions: 10
  slippage_pct: 0.001
  commission_per_trade: 1.0
  holding_periods: [3, 5, 7]
  confidence_sizing: true

output_dir: "backtest_results/multi_engine"
tuning_meta:
  config_label: "baseline_default"
