name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Pin ruff: an unpinned `pip install ruff` pulls the latest release, whose
      # newer rules/config handling turned the whole repo red overnight with no
      # code change (e.g. E712 fired despite being in pyproject's ignore list).
      # Pin to the version the repo is linted against; bump deliberately.
      - run: pip install ruff==0.7.4
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest --cov=src --cov-report=term-missing \
            -m "not integration" -q
