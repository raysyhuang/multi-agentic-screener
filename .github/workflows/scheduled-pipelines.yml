name: Scheduled Pipelines (GitHub-hosted)

# Runs the pipeline jobs that used to live on the Heroku `worker` dyno's
# APScheduler (see src/worker.py). Each job invokes the worker's existing
# one-off flags (--run-now / --check-now), which run a single pipeline and
# exit — exactly what a CI cron needs.
#
# The evening cross-engine collection and weekly meta-review jobs were removed
# with the cross-engine and LLM subsystems (2026-07 lean strip) — only the
# morning pipeline and afternoon position check remain.
#
# DST handling: GitHub Actions cron is UTC-only and cannot follow US/Eastern
# across daylight-saving changes. For each logical job we register TWO cron
# lines — one at the EDT (UTC-4) offset and one at the EST (UTC-5) offset — and
# a guard step below runs a line only when its offset matches the CURRENT
# Eastern timezone (EDT vs EST). Zone-matching is delay-proof: GitHub routinely
# fires crons 1-2h late, and the previous exact-hour guard silently skipped
# every late run (all four 2026-07-21 slots were skipped this way — only the
# Heroku parallel worker actually ran that day). Net effect: exactly one line
# per slot matches year-round, and it runs whenever GitHub gets around to it.
#
# NOTE: scheduled workflows only fire from the repository's DEFAULT branch, so
# this file must be merged to `main` before the crons take effect. Until then,
# use the "Run workflow" button (workflow_dispatch) to test any job manually.

on:
  schedule:
    # Morning pipeline — 06:00 ET Mon-Fri   (EDT 10:00 UTC / EST 11:00 UTC)
    - cron: "0 10 * * 1-5"
    - cron: "0 11 * * 1-5"
    # Afternoon position check — 16:30 ET Mon-Fri   (EDT 20:30 UTC / EST 21:30 UTC)
    - cron: "30 20 * * 1-5"
    - cron: "30 21 * * 1-5"
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Which pipeline to run"
        required: true
        default: "morning"
        type: choice
        options:
          - morning
          - afternoon

concurrency:
  # Serialize per pipeline; never cancel an in-flight run (the pipelines are
  # idempotent/re-run safe, but we don't want to interrupt a live run).
  group: mas-pipeline-${{ github.event.schedule || github.event.inputs.pipeline }}
  cancel-in-progress: false

jobs:
  run-pipeline:
    name: Run scheduled pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # --- Database (external managed Postgres — replaces Heroku Postgres) ---
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # --- Telegram alerts ---
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Label GitHub-run alerts distinctly from Heroku's ([MAS]) during the
      # parallel-run window. Override via repo variable TELEGRAM_ALERT_PREFIX.
      TELEGRAM_ALERT_PREFIX: ${{ vars.TELEGRAM_ALERT_PREFIX || 'MAS-GH' }}
      # --- Market data providers (quant_only needs at least one) ---
      FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      FINANCIAL_DATASETS_API_KEY: ${{ secrets.FINANCIAL_DATASETS_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      # --- Misc ---
      API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
      EXECUTION_MODE: ${{ vars.EXECUTION_MODE || 'quant_only' }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: pip install -e .

      - name: Resolve pipeline & DST guard
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PIPELINE="${{ github.event.inputs.pipeline }}"
            RUN="true"
            echo "Manual dispatch: pipeline=$PIPELINE"
          else
            SCHED="${{ github.event.schedule }}"
            # Each schedule line is tied to the timezone offset it was written
            # for; it runs iff Eastern time is CURRENTLY in that offset. This is
            # delay-proof (GitHub fires crons 1-2h late routinely) — unlike
            # exact-hour matching, which silently skipped every late run.
            case "$SCHED" in
              "0 10 * * 1-5")  PIPELINE="morning";   LINE_ZONE="EDT" ;;
              "0 11 * * 1-5")  PIPELINE="morning";   LINE_ZONE="EST" ;;
              "30 20 * * 1-5") PIPELINE="afternoon"; LINE_ZONE="EDT" ;;
              "30 21 * * 1-5") PIPELINE="afternoon"; LINE_ZONE="EST" ;;
              *) echo "::error::Unknown schedule '$SCHED'"; exit 1 ;;
            esac
            CUR_ZONE=$(TZ=America/New_York date +%Z)
            RUN="true"
            [ "$CUR_ZONE" != "$LINE_ZONE" ] && RUN="false"
            echo "schedule='$SCHED' pipeline=$PIPELINE line_zone=$LINE_ZONE current_zone=$CUR_ZONE -> run=$RUN"
            if [ "$RUN" != "true" ]; then
              echo "::notice::Skipping — this cron line is the $LINE_ZONE offset; Eastern is currently $CUR_ZONE."
            fi
          fi
          case "$PIPELINE" in
            morning)   FLAG="--run-now"   ;;
            afternoon) FLAG="--check-now" ;;
            *) echo "::error::Unknown pipeline '$PIPELINE'"; exit 1 ;;
          esac
          {
            echo "pipeline=$PIPELINE"
            echo "flag=$FLAG"
            echo "run=$RUN"
          } >> "$GITHUB_OUTPUT"

      - name: Apply database migrations
        if: steps.resolve.outputs.run == 'true'
        run: alembic upgrade head

      - name: Run ${{ steps.resolve.outputs.pipeline }} pipeline
        if: steps.resolve.outputs.run == 'true'
        run: python -m src.worker ${{ steps.resolve.outputs.flag }}
