tracks:
  # ── Convergence scoring ──────────────────────────────────────────
  - name: high_convergence
    description: "Reward 2-engine agreement more aggressively"
    overrides:
      convergence_2_engine_multiplier: 1.5
      convergence_3_engine_multiplier: 1.2

  - name: low_convergence
    description: "Discount multi-engine agreement — trust single-engine conviction"
    overrides:
      convergence_2_engine_multiplier: 0.9
      convergence_1_engine_multiplier: 1.3

  - name: sector_convergence_boost
    description: "Amplify same-sector picks across engines"
    overrides:
      convergence_sector_multiplier: 1.4
      convergence_2_engine_multiplier: 1.4

  # ── Guardian / risk sizing ───────────────────────────────────────
  - name: tight_guardian
    description: "Tighter risk management — lower heat, smaller bear sizing"
    overrides:
      guardian_max_drawdown_pct: 15.0
      guardian_bear_sizing: 0.50
      guardian_max_portfolio_heat_pct: 8.0

  - name: loose_guardian
    description: "Wider risk tolerance — more heat, larger positions"
    overrides:
      guardian_max_drawdown_pct: 28.0
      guardian_bear_sizing: 0.80
      guardian_max_portfolio_heat_pct: 18.0
      guardian_per_trade_risk_cap_pct: 3.0

  - name: aggressive_per_trade
    description: "Higher per-trade risk cap with faster loss halts"
    overrides:
      guardian_per_trade_risk_cap_pct: 3.5
      guardian_halt_after_consecutive_losses: 5
      guardian_streak_reduction_after: 2

  - name: concentrated_portfolio
    description: "Fewer positions, higher conviction — max 2 overlap positions"
    overrides:
      low_overlap_max_positions: 2
      min_confidence: 50.0
      guardian_max_sector_concentration: 2

  # ── Regime strategy weighting ────────────────────────────────────
  - name: bull_mean_rev_discount
    description: "Discount mean reversion in bull regime — oversold signals less reliable in strong uptrends"
    overrides:
      regime_multipliers:
        bull:
          mean_reversion: 0.75

  - name: bear_mean_rev_boost
    description: "Amplify mean reversion in bear regime — oversold bounces more reliable in fear"
    overrides:
      regime_multipliers:
        bear:
          mean_reversion: 1.4
      regime_gate_bear_penalty_multiplier: 0.45

  - name: soft_bear_penalty
    description: "Lighter bear penalty — let more strategies through in downturns"
    overrides:
      regime_gate_bear_penalty_multiplier: 0.85
      guardian_bear_sizing: 0.75

  # ── Confidence / quality gates ───────────────────────────────────
  - name: quality_floor_45
    description: "Higher minimum confidence for synthesis"
    overrides:
      min_confidence: 45.0

  - name: low_floor_wide_net
    description: "Lower confidence floor — cast wider net, more picks"
    overrides:
      min_confidence: 32.0
      low_overlap_max_positions: 5

  # ── Credibility memory ───────────────────────────────────────────
  - name: long_credibility_memory
    description: "Longer lookback for engine credibility — 60-day window"
    overrides:
      credibility_lookback_days: 60
      credibility_min_picks_for_weight: 15

  - name: short_credibility_memory
    description: "Short lookback — quick adaptation to recent engine performance"
    overrides:
      credibility_lookback_days: 14
      credibility_min_picks_for_weight: 5

  # ── Combo tracks (multi-dimension) ──────────────────────────────
  - name: bear_fortress
    description: "Bear-optimized combo: tight guardian + mean reversion focus + high confidence"
    overrides:
      guardian_bear_sizing: 0.40
      guardian_max_portfolio_heat_pct: 7.0
      min_confidence: 48.0
      regime_gate_bear_penalty_multiplier: 0.50
      regime_multipliers:
        bear:
          mean_reversion: 1.3

  - name: conviction_sniper
    description: "High convergence + high confidence + concentrated — few but strong picks"
    overrides:
      convergence_2_engine_multiplier: 1.8
      convergence_3_engine_multiplier: 1.5
      min_confidence: 52.0
      low_overlap_max_positions: 2
      guardian_per_trade_risk_cap_pct: 3.0

  # ── V1.2 Alpha Upgrade Tracks ────────────────────────────────
  - name: trailing_stop_only
    description: "Trailing stop 0.5%/0.3% without partial profit taking"
    overrides:
      trail_activate_pct: 0.5
      trail_distance_pct: 0.3
      partial_tp_enabled: false

  - name: two_leg_full
    description: "Two-leg: 50% partial at 1.0x ATR + trailing + breakeven pivot"
    overrides:
      trail_activate_pct: 0.5
      trail_distance_pct: 0.3
      partial_tp_enabled: true
      partial_tp_atr_multiple: 1.0

  - name: veto_board
    description: "Veto-first architecture: penalize conflicting picks, bonus idiosyncratic"
    overrides:
      veto_board_enabled: true
      veto_penalty: 0.5
      idiosyncratic_bonus_multiplier: 1.10

  - name: choppy_gate_75
    description: "Score >= 75 in choppy regime + ATR percentile floor"
    overrides:
      choppy_min_score: 75
      min_atr_percentile_252: 0.10

  - name: earnings_blackout
    description: "Block picks within 2 days of earnings"
    overrides:
      earnings_blackout_days: 2

  # ── Phase 2 Win-Rate Tracks ─────────────────────────────────
  - name: confirm_close_entry
    description: "High WR variant: require bullish T+1 candle, enter at T+1 close. 78% WR, 22% MaxDD."
    overrides:
      confirm_entry_enabled: true
      confirm_mode: "close_gt_open"

  - name: confirm_t2_open_entry
    description: "Confirmation proxy: require green T+1 candle, enter at T+2 open. 73% WR."
    overrides:
      confirm_entry_enabled: true
      confirm_mode: "close_gt_open_open_entry"

  - name: weekly_trend_gate
    description: "Only take MR signals when close > 150-day SMA (uptrend intact)"
    overrides:
      weekly_trend_gate_enabled: true
      weekly_trend_sma_days: 150

  - name: score_tiered_stops_v3
    description: "Score-dependent stop widths: >=85→1.25×ATR, 70-84→0.85×ATR, <70→0.50×ATR. Sharpe +6.7%, PF +9.4%."
    overrides:
      score_tiered_stops_enabled: true
